<!doctype html>
<html>
  <head>
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <script src="https://loc8.us/maplibre-gl-vector-text-protocol/dist/maplibre-gl-vector-text-protocol.js"></script>
    <link
      href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      const map = new maplibregl.Map({
        container: "map",
        style: "{{.MapStyle}}",
        center: [10, 50],
        zoom: 6,
      });

      map.on("load", async () => {
        try {
          const response = await fetch("/api/heatmap");
          const geojson = await response.json();

          map.addSource("tracks-source", {
            type: "geojson",
            data: geojson,
          });

          map.addLayer({
            id: "tracks-layer",
            type: "line",
            source: "tracks-source",
            paint: {
              "line-color": [
                "interpolate",
                ["linear"],
                ["get", "count"],
                1,
                "rgb(30, 144, 255)",
                5,
                "rgb(64, 164, 255)",
                20,
                "rgb(100, 200, 255)",
                50,
                "rgb(150, 220, 255)",
                100,
                "rgb(200, 240, 255)",
              ],
              "line-width": [
                "interpolate",
                ["linear"],
                ["zoom"],
                8,
                ["interpolate", ["linear"], ["get", "count"], 1, 0.3, 100, 0.8],
                10,
                ["interpolate", ["linear"], ["get", "count"], 1, 0.5, 100, 1.5],
                12,
                ["interpolate", ["linear"], ["get", "count"], 1, 1, 100, 2.5],
                15,
                ["interpolate", ["linear"], ["get", "count"], 1, 1.5, 100, 4],
                18,
                ["interpolate", ["linear"], ["get", "count"], 1, 2, 100, 6],
              ],
              "line-opacity": [
                "interpolate",
                ["linear"],
                ["get", "count"],
                1,
                0.5,
                5,
                0.65,
                20,
                0.8,
                100,
                1,
              ],
              "line-blur": 0.5,
            },
          });

          console.log(`Loaded heatmap with ${geojson.features.length} tracks`);
        } catch (error) {
          console.error("Error loading heatmap:", error);
        }
      });
    </script>
  </body>
</html>

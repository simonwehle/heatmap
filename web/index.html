<!doctype html>
<html>
  <head>
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <script src="https://loc8.us/maplibre-gl-vector-text-protocol/dist/maplibre-gl-vector-text-protocol.js"></script>
    <link
      href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      const map = new maplibregl.Map({
        container: "map",
        style: "{{.MapStyle}}",
        center: [10, 50],
        zoom: 6,
      });

      map.on("load", async () => {
        try {
          const response = await fetch("/api/heatmap");
          const geojson = await response.json();

          map.addSource("tracks-source", {
            type: "geojson",
            data: geojson,
          });

          map.addLayer({
            id: "tracks-layer",
            type: "line",
            source: "tracks-source",
            paint: {
              "line-color": [
                "interpolate",
                ["linear"],
                ["get", "count"],
                1,
                "rgba(0, 100, 255, 0.3)",
                5,
                "rgba(0, 100, 255, 0.5)",
                20,
                "rgba(0, 150, 255, 0.7)",
                50,
                "rgba(0, 200, 255, 0.8)",
                100,
                "rgb(0, 200, 255)",
              ],
              "line-width": [
                "interpolate",
                ["linear"],
                ["get", "count"],
                1,
                1,
                5,
                2,
                20,
                3,
                50,
                4,
                100,
                6,
              ],
              "line-opacity": [
                "interpolate",
                ["linear"],
                ["get", "count"],
                1,
                0.3,
                5,
                0.5,
                20,
                0.7,
                100,
                1,
              ],
            },
          });

          console.log(`Loaded heatmap with ${geojson.features.length} tracks`);
        } catch (error) {
          console.error("Error loading heatmap:", error);
        }
      });
    </script>
  </body>
</html>
